<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>皮克敏蘑菇重生時間換算工具</title>
<style>
  :root {
    --bg: #0d1a0f;
    --surface: #132018;
    --surface2: #1c2f22;
    --border: #2a4030;
    --accent: #4ecb6e;
    --accent2: #a8e63c;
    --warn: #f5c842;
    --danger: #ff6b35;
    --respawn: #7ee8a2;
    --text: #d4f0da;
    --text-muted: #6b9a74;
    --top1: #ffd700;
    --top2: #c0c0c0;
    --top3: #cd7f32;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #132018 0%, #0d2215 100%);
    border-bottom: 2px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }

  .header-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mushroom-icon {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(78,203,110,0.6));
  }

  h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1.2;
    flex: 1;
  }

  /* 連線狀態燈 */
  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.4s;
  }

  .sync-indicator.connected .sync-dot { background: var(--accent); animation: blink 2s infinite; }
  .sync-indicator.error .sync-dot { background: var(--danger); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clock-display {
    padding: 8px 14px;
    background: rgba(78,203,110,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .clock-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; }

  .clock-time {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    text-shadow: 0 0 16px rgba(78,203,110,0.4);
  }

  /* ── ROOM BAR ── */
  .room-bar {
    max-width: 640px;
    margin: 0 auto;
    padding: 10px 12px 0;
  }

  .room-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .room-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

  .room-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    outline: none;
    min-width: 0;
    letter-spacing: 0.05em;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  }

  .room-input:focus { border-color: var(--accent); }
  .room-input::placeholder { font-weight: 400; font-size: 13px; color: var(--text-muted); font-family: inherit; }

  .btn-room-join {
    background: var(--accent);
    color: #0a1a0c;
    border: none;
    border-radius: 7px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-room-join:active { background: var(--accent2); transform: scale(0.97); }

  /* ── MAIN ── */
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 10px 12px 0;
  }

  .info-bar {
    background: rgba(78,203,110,0.06);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .info-bar strong { color: var(--accent2); }

  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .btn {
    border: none;
    border-radius: 8px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.97); }

  .btn-add { background: var(--accent); color: #0a1a0c; flex: 1; justify-content: center; }
  .btn-add:active { background: var(--accent2); }
  .btn-clear-all { background: var(--surface2); color: var(--danger); border: 1px solid rgba(255,107,53,0.3); }
  .btn-clear-all:active { background: rgba(255,107,53,0.15); }

  /* ── CARDS ── */
  #card-list { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }

  .card.rank-1 { border-color: var(--top1); box-shadow: 0 0 0 1px rgba(255,215,0,0.3), 0 4px 20px rgba(255,215,0,0.1); }
  .card.rank-2 { border-color: var(--top2); box-shadow: 0 0 0 1px rgba(192,192,192,0.2); }
  .card.rank-3 { border-color: var(--top3); box-shadow: 0 0 0 1px rgba(205,127,50,0.2); }
  .card.status-respawned { border-color: var(--respawn); box-shadow: 0 0 0 1px rgba(126,232,162,0.3), 0 4px 20px rgba(126,232,162,0.1); }
  .card.status-soon { border-color: var(--warn); box-shadow: 0 0 0 1px rgba(245,200,66,0.3); }

  .card-ribbon { height: 3px; background: var(--border); transition: background 0.3s; }
  .card.rank-1 .card-ribbon { background: var(--top1); }
  .card.rank-2 .card-ribbon { background: var(--top2); }
  .card.rank-3 .card-ribbon { background: var(--top3); }
  .card.status-respawned .card-ribbon { background: var(--respawn); }
  .card.status-soon .card-ribbon { background: var(--warn); }

  .card-body { padding: 12px 12px 10px; }

  .card-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

  .rank-badge {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
  }

  .card.rank-1 .rank-badge { background: var(--top1); color: #1a1200; border-color: var(--top1); }
  .card.rank-2 .rank-badge { background: var(--top2); color: #1a1a1a; border-color: var(--top2); }
  .card.rank-3 .rank-badge { background: var(--top3); color: #1a0e00; border-color: var(--top3); }

  .name-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 12px; font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.2s; min-width: 0;
  }

  .name-input::placeholder { color: var(--text-muted); font-size: 13px; }
  .name-input:focus { border-color: var(--accent); }

  .btn-clear-card {
    background: transparent; border: 1px solid rgba(255,107,53,0.3);
    border-radius: 7px; padding: 8px 10px; color: var(--danger);
    font-size: 13px; cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }

  .btn-clear-card:active { background: rgba(255,107,53,0.15); }

  .timer-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }

  .timer-label { font-size: 11px; color: var(--text-muted); flex-shrink: 0; width: 50px; }

  .timer-inputs { display: flex; gap: 4px; align-items: center; flex: 1; }

  .time-field-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }

  .time-field-unit { font-size: 10px; color: var(--text-muted); }

  .time-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 10px 4px; font-size: 18px; font-weight: 600;
    color: var(--text); text-align: center; outline: none;
    -webkit-appearance: none; appearance: none;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    transition: border-color 0.2s; min-width: 0;
  }

  .time-input:focus { border-color: var(--accent); }

  .time-sep { font-size: 20px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; padding-bottom: 14px; }

  .result-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }

  .result-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }

  .result-box-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }

  .result-box-time {
    font-size: 20px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    letter-spacing: 0.04em; line-height: 1;
  }

  .result-box-time.respawn-time { color: var(--accent); }

  .day-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    background: var(--accent2); color: #0a1a0c;
    border-radius: 4px; padding: 1px 4px; margin-left: 3px; vertical-align: middle;
  }

  .status-row { display: flex; justify-content: flex-end; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }

  .status-badge.waiting { background: rgba(107,154,116,0.15); color: var(--text-muted); border: 1px solid rgba(107,154,116,0.25); }
  .status-badge.soon { background: rgba(245,200,66,0.15); color: var(--warn); border: 1px solid rgba(245,200,66,0.35); animation: pulse-warn 1.2s infinite; }
  .status-badge.respawned { background: rgba(78,203,110,0.15); color: var(--accent); border: 1px solid rgba(78,203,110,0.35); animation: pulse-respawn 1s infinite; }
  .status-badge.empty { background: transparent; color: var(--text-muted); border: 1px solid transparent; font-size: 11px; }

  @keyframes pulse-warn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,200,66,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(245,200,66,0); }
  }

  @keyframes pulse-respawn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(78,203,110,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(78,203,110,0); }
  }

  footer {
    text-align: center; padding: 24px 16px 8px;
    font-size: 11px; color: var(--text-muted);
    max-width: 640px; margin: 0 auto;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-row">
      <div class="mushroom-icon">🍄</div>
      <h1>皮克敏蘑菇<br>重生時間換算工具</h1>
      <div class="sync-indicator" id="syncIndicator">
        <div class="sync-dot"></div>
        <span id="syncLabel">連線中…</span>
      </div>
    </div>
    <div class="clock-display">
      <span class="clock-label">目前時間</span>
      <span class="clock-time" id="clock">--:--:--</span>
    </div>
  </div>
</header>

<!-- 房間列 -->
<div class="room-bar">
  <div class="room-inner">
    <span class="room-label">🏠 房間</span>
    <input class="room-input" id="roomInput" type="text"
      placeholder="輸入房間名稱（與朋友相同）" maxlength="30" autocomplete="off" autocapitalize="none">
    <button class="btn-room-join" onclick="joinRoom()">加入</button>
  </div>
</div>

<main>
  <div class="info-bar">
    💡 輸入相同<strong>房間名稱</strong>即可與朋友共享同一份紀錄，資料即時同步。輸入蘑菇<strong>還剩幾時幾分幾秒被消滅</strong>，自動換算消滅與重生時間（+<strong>5 分鐘</strong>）。
  </div>

  <div class="actions">
    <button class="btn btn-add" onclick="addCard()">＋ 新增蘑菇</button>
    <button class="btn btn-clear-all" onclick="clearAll()">🗑 全部清除</button>
  </div>

  <div id="card-list"></div>
</main>

<footer>🍄 皮克敏探險玩家工具 · 資料透過 Firebase 即時同步</footer>

<!-- Firebase SDK (compat 版，純 CDN script，無需 bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ───────────── FIREBASE CONFIG ───────────── */
const firebaseConfig = {
  apiKey: "AIzaSyDqh2EQ1ui1ZbvmzapTU1n-5Kk6dggyfy8",
  authDomain: "pikmin-mushroom-725ac.firebaseapp.com",
  databaseURL: "https://pikmin-mushroom-725ac-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pikmin-mushroom-725ac",
  storageBucket: "pikmin-mushroom-725ac.firebasestorage.app",
  messagingSenderId: "589804092335",
  appId: "1:589804092335:web:994a8375ee83fe4f2ccd5a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ───────────── CONFIG ───────────── */
const RESPAWN_DELAY_MS = 5 * 60 * 1000;
const ROOM_STORAGE_KEY = 'pikmin_room_v1';
const MIN_CARDS = 5;

/* ───────────── STATE ───────────── */
let cards = [];          // local mirror
let currentRoom = '';    // 目前房間名稱
let dbRef = null;        // Firebase ref
let dbListener = null;   // listener handle
let sortTimer = null;
let ignoreNextRemote = false; // 避免自己的寫入觸發 renderAll

/* ───────────── CLOCK ───────────── */
function pad(n) { return String(n).padStart(2, '0'); }

function fmtTime(ts) {
  if (!ts) return '--:--:--';
  const d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function dayDiff(ts) {
  if (!ts) return 0;
  const now = new Date();
  const d = new Date(ts);
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const targetMid = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((targetMid - todayMid) / 86400000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  refreshAllStatuses();
}

setInterval(updateClock, 1000);
updateClock();

/* ───────────── SYNC INDICATOR ───────────── */
function setSyncStatus(state, label) {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator ' + state;
  document.getElementById('syncLabel').textContent = label;
}

/* ───────────── ROOM ───────────── */
function sanitizeRoom(name) {
  // Firebase key 不允許 . # $ [ ] /
  return name.trim().replace(/[.#$\[\]/]/g, '_').substring(0, 30);
}

function joinRoom() {
  const raw = document.getElementById('roomInput').value.trim();
  if (!raw) { alert('請輸入房間名稱'); return; }
  const room = sanitizeRoom(raw);
  document.getElementById('roomInput').value = room;
  localStorage.setItem(ROOM_STORAGE_KEY, room);
  attachRoom(room);
}

function attachRoom(room) {
  // 先卸載舊 listener
  if (dbRef && dbListener) {
    dbRef.off('value', dbListener);
  }

  currentRoom = room;
  dbRef = db.ref('rooms/' + room + '/cards');
  setSyncStatus('', '連線中…');

  dbListener = dbRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data === null) {
      // 房間是空的，初始化空卡
      cards = [];
      ensureMinCards();
      pushToFirebase();
    } else {
      // 從 Firebase 收到資料，依 sortOrder 排列
      const incoming = Object.values(data);
      incoming.sort((a, b) => (a.sortOrder ?? 999) - (b.sortOrder ?? 999));
      // 只在非自己寫入時更新（避免游標跳動）
      if (!ignoreNextRemote) {
        cards = incoming;
        ensureMinCards();
        renderAll();
      }
      ignoreNextRemote = false;
    }
    setSyncStatus('connected', room);
  }, (err) => {
    console.error(err);
    setSyncStatus('error', '連線失敗');
  });

  // 連線狀態
  db.ref('.info/connected').on('value', (snap) => {
    if (snap.val() === false) setSyncStatus('error', '離線中');
  });
}

/* ───────────── FIREBASE WRITE ───────────── */
function pushToFirebase() {
  if (!dbRef) return;
  ignoreNextRemote = true;
  // 轉成 object（Firebase 偏好 object，key = card.id）
  const obj = {};
  cards.forEach(c => { obj[c.id] = c; });
  dbRef.set(obj).catch(err => {
    console.error('Write failed:', err);
    setSyncStatus('error', '寫入失敗');
    ignoreNextRemote = false;
  });
}

/* ───────────── CARD DATA ───────────── */
let _idCounter = Date.now();
function uid() { return 'c' + (++_idCounter); }

function emptyCard() {
  return { id: uid(), name: '', killTs: null, respawnTs: null, sortOrder: 999 };
}

function ensureMinCards() {
  while (cards.length < MIN_CARDS) cards.push(emptyCard());
}

/* ───────────── CALCULATE ───────────── */
function calcTimestamps(h, m, s) {
  const hv = parseInt(h) || 0;
  const mv = parseInt(m) || 0;
  const sv = parseInt(s) || 0;
  if (hv === 0 && mv === 0 && sv === 0) return { killTs: null, respawnTs: null };
  const remainMs = (hv * 3600 + mv * 60 + sv) * 1000;
  const now = Date.now();
  return { killTs: now + remainMs, respawnTs: now + remainMs + RESPAWN_DELAY_MS };
}

/* ───────────── STATUS ───────────── */
function getStatus(respawnTs) {
  if (!respawnTs) return 'empty';
  const diff = respawnTs - Date.now();
  if (diff <= 0) return 'respawned';
  if (diff <= 60000) return 'soon';
  return 'waiting';
}

/* ───────────── SORT ───────────── */
function getSortKey(card) {
  return card.respawnTs || Infinity;
}

function sortCards() {
  cards.sort((a, b) => getSortKey(a) - getSortKey(b));
  // 排序後把位置寫進每張卡片，讓朋友那端也能依此排列
  cards.forEach((c, i) => { c.sortOrder = i; });
  pushToFirebase();
  renderAll();
}

function debouncedSort() {
  if (sortTimer) clearTimeout(sortTimer);
  sortTimer = setTimeout(sortCards, 700);
}

/* ───────────── RENDER ───────────── */
function computeRankMap() {
  const ranked = cards
    .filter(c => c.respawnTs && getStatus(c.respawnTs) !== 'respawned')
    .sort((a, b) => a.respawnTs - b.respawnTs);
  const rankMap = {};
  ranked.slice(0, 3).forEach((c, i) => { rankMap[c.id] = i + 1; });
  return rankMap;
}

function renderAll() {
  const list = document.getElementById('card-list');

  const focusedEl = document.activeElement;
  let focusedCardId = null, focusedField = null;
  if (focusedEl) {
    const cardEl = focusedEl.closest('[data-id]');
    if (cardEl) {
      focusedCardId = cardEl.dataset.id;
      focusedField = focusedEl.dataset.field;
    }
  }

  list.innerHTML = '';
  const rankMap = computeRankMap();

  cards.forEach((card) => {
    const rank = rankMap[card.id] || 0;
    const status = getStatus(card.respawnTs);
    const killStr = card.killTs ? fmtTime(card.killTs) : '--:--:--';
    const respStr = card.respawnTs ? fmtTime(card.respawnTs) : '--:--:--';
    const dayKillHtml = dayDiff(card.killTs) > 0 ? `<span class="day-badge">+${dayDiff(card.killTs)}天</span>` : '';
    const dayRespHtml = dayDiff(card.respawnTs) > 0 ? `<span class="day-badge">+${dayDiff(card.respawnTs)}天</span>` : '';

    let cardClass = 'card';
    if (rank === 1) cardClass += ' rank-1';
    else if (rank === 2) cardClass += ' rank-2';
    else if (rank === 3) cardClass += ' rank-3';
    else if (status === 'respawned') cardClass += ' status-respawned';
    else if (status === 'soon') cardClass += ' status-soon';

    let statusHtml = '';
    if (status === 'empty') statusHtml = '<span class="status-badge empty">尚未輸入</span>';
    else if (status === 'waiting') statusHtml = '<span class="status-badge waiting">🌿 等待中</span>';
    else if (status === 'soon') statusHtml = '<span class="status-badge soon">⚡ 即將重生！</span>';
    else if (status === 'respawned') statusHtml = '<span class="status-badge respawned">✨ 已重生</span>';

    const div = document.createElement('div');
    div.className = cardClass;
    div.dataset.id = card.id;
    div.innerHTML = `
      <div class="card-ribbon"></div>
      <div class="card-body">
        <div class="card-name-row">
          <div class="rank-badge">${rank > 0 ? rank : '—'}</div>
          <input class="name-input" type="text" placeholder="蘑菇名稱 / 位置" maxlength="30"
            data-field="name" value="${escHtml(card.name)}" autocomplete="off">
          <button class="btn-clear-card" onclick="clearCard('${card.id}')">清除</button>
        </div>
        <div class="timer-row">
          <div class="timer-label">剩餘時間</div>
          <div class="timer-inputs">
            <div class="time-field-wrap">
              <input class="time-input" type="number" min="0" max="23" placeholder="0"
                data-field="h" inputmode="numeric">
              <div class="time-field-unit">時</div>
            </div>
            <div class="time-sep">:</div>
            <div class="time-field-wrap">
              <input class="time-input" type="number" min="0" max="59" placeholder="0"
                data-field="m" inputmode="numeric">
              <div class="time-field-unit">分</div>
            </div>
            <div class="time-sep">:</div>
            <div class="time-field-wrap">
              <input class="time-input" type="number" min="0" max="59" placeholder="0"
                data-field="s" inputmode="numeric">
              <div class="time-field-unit">秒</div>
            </div>
          </div>
        </div>
        <div class="result-row">
          <div class="result-box">
            <div class="result-box-label">💀 預計消滅</div>
            <div class="result-box-time" id="kill-${card.id}">${killStr}${dayKillHtml}</div>
          </div>
          <div class="result-box">
            <div class="result-box-label">🍄 預計重生</div>
            <div class="result-box-time respawn-time" id="resp-${card.id}">${respStr}${dayRespHtml}</div>
          </div>
        </div>
        <div class="status-row">${statusHtml}</div>
      </div>
    `;

    list.appendChild(div);

    // 名稱輸入
    div.querySelector('[data-field="name"]').addEventListener('input', (e) => {
      const idx = cards.findIndex(c => c.id === card.id);
      if (idx !== -1) { cards[idx].name = e.target.value; pushToFirebase(); }
    });

    // 還原剩餘時間顯示
    const hEl = div.querySelector('[data-field="h"]');
    const mEl = div.querySelector('[data-field="m"]');
    const sEl = div.querySelector('[data-field="s"]');

    if (card.killTs) {
      const remainMs = card.killTs - Date.now();
      if (remainMs > 0) {
        const totalSec = Math.ceil(remainMs / 1000);
        const hv = Math.floor(totalSec / 3600);
        const mv = Math.floor((totalSec % 3600) / 60);
        const sv = totalSec % 60;
        if (hv > 0) hEl.value = hv;
        if (mv > 0) mEl.value = mv;
        if (sv > 0) sEl.value = sv;
      }
    }

    [hEl, mEl, sEl].forEach(el => {
      el.addEventListener('input', () => onTimeInput(card.id, hEl.value, mEl.value, sEl.value));
      el.addEventListener('change', () => onTimeInput(card.id, hEl.value, mEl.value, sEl.value));
    });
  });

  // 還原 focus
  if (focusedCardId && focusedField) {
    const targetCard = list.querySelector(`[data-id="${focusedCardId}"]`);
    if (targetCard) {
      const targetEl = targetCard.querySelector(`[data-field="${focusedField}"]`);
      if (targetEl) { targetEl.focus(); if (targetEl.select) targetEl.select(); }
    }
  }
}

function refreshAllStatuses() {
  const rankMap = computeRankMap();
  cards.forEach(card => {
    const cardEl = document.querySelector(`[data-id="${card.id}"]`);
    if (!cardEl) return;
    const status = getStatus(card.respawnTs);

    const killEl = document.getElementById('kill-' + card.id);
    const respEl = document.getElementById('resp-' + card.id);

    if (killEl && card.killTs) {
      const dd = dayDiff(card.killTs);
      killEl.innerHTML = fmtTime(card.killTs) + (dd > 0 ? `<span class="day-badge">+${dd}天</span>` : '');
    }
    if (respEl && card.respawnTs) {
      const dd = dayDiff(card.respawnTs);
      respEl.innerHTML = fmtTime(card.respawnTs) + (dd > 0 ? `<span class="day-badge">+${dd}天</span>` : '');
    }

    const statusRow = cardEl.querySelector('.status-row');
    if (statusRow) {
      let html = '';
      if (status === 'empty') html = '<span class="status-badge empty">尚未輸入</span>';
      else if (status === 'waiting') html = '<span class="status-badge waiting">🌿 等待中</span>';
      else if (status === 'soon') html = '<span class="status-badge soon">⚡ 即將重生！</span>';
      else if (status === 'respawned') html = '<span class="status-badge respawned">✨ 已重生</span>';
      statusRow.innerHTML = html;
    }

    const rank = rankMap[card.id] || 0;
    cardEl.className = 'card';
    if (rank === 1) cardEl.classList.add('rank-1');
    else if (rank === 2) cardEl.classList.add('rank-2');
    else if (rank === 3) cardEl.classList.add('rank-3');
    else if (status === 'respawned') cardEl.classList.add('status-respawned');
    else if (status === 'soon') cardEl.classList.add('status-soon');

    const badge = cardEl.querySelector('.rank-badge');
    if (badge) badge.textContent = rank > 0 ? rank : '—';
  });
}

/* ───────────── EVENT HANDLERS ───────────── */
function onTimeInput(cardId, h, m, s) {
  const idx = cards.findIndex(c => c.id === cardId);
  if (idx === -1) return;
  const hv = parseInt(h) || 0, mv = parseInt(m) || 0, sv = parseInt(s) || 0;
  if (hv === 0 && mv === 0 && sv === 0) {
    cards[idx].killTs = null; cards[idx].respawnTs = null;
    pushToFirebase(); refreshAllStatuses(); return;
  }
  const { killTs, respawnTs } = calcTimestamps(h, m, s);
  cards[idx].killTs = killTs; cards[idx].respawnTs = respawnTs;
  pushToFirebase(); refreshAllStatuses(); debouncedSort();
}

function addCard() {
  if (!currentRoom) { alert('請先輸入房間名稱並按「加入」'); return; }
  cards.push(emptyCard());
  pushToFirebase();
  renderAll();
  setTimeout(() => {
    const last = document.getElementById('card-list').lastElementChild;
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function clearCard(cardId) {
  const idx = cards.findIndex(c => c.id === cardId);
  if (idx !== -1) {
    cards[idx] = { ...emptyCard(), id: cardId };
    pushToFirebase(); renderAll();
  }
}

function clearAll() {
  if (!confirm('確定要清除所有蘑菇資料嗎？（所有人都會看到）')) return;
  cards = [];
  ensureMinCards();
  pushToFirebase(); renderAll();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ───────────── INIT ───────────── */
// 還原上次的房間
const savedRoom = localStorage.getItem(ROOM_STORAGE_KEY);
if (savedRoom) {
  document.getElementById('roomInput').value = savedRoom;
  attachRoom(savedRoom);
} else {
  // 還沒選房間，先顯示空卡（純本地）
  ensureMinCards();
  renderAll();
  setSyncStatus('', '未加入房間');
}

// 讓 Enter 也能加入房間
document.getElementById('roomInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinRoom();
});
</script>
</body>
</html>
